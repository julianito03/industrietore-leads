<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>3D-Karte · Verladeregister Deutschland</title>
<style>
:root{--panel:#FFFFFF;--ink:#22262B;--ink-2:#5A626C;--line:#D4D8DC;--accent:#F0B400;--accent-ink:#1A1400}
@media (prefers-color-scheme: dark){:root{--panel:#1E2126;--ink:#E8EAEC;--ink-2:#9AA2AC;--line:#33383E}}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font:13px/1.4 "Helvetica Neue",Arial,sans-serif;color:var(--ink);background:#0b0e12}
#deck{position:absolute;inset:0}
#hud{position:absolute;top:12px;left:12px;z-index:5;background:var(--panel);border:1px solid var(--line);padding:12px 14px;max-width:290px;box-shadow:0 2px 10px rgba(0,0,0,.35)}
#hud h1{font-size:15px;text-transform:uppercase;letter-spacing:.05em}
#hud h1 span{background:var(--accent);color:var(--accent-ink);padding:0 6px}
#hud .sub{color:var(--ink-2);font-size:11.5px;margin:5px 0 9px}
.btnrow{display:flex;gap:6px;flex-wrap:wrap}
.btnrow button,.btnrow a{padding:6px 10px;border:1px solid var(--line);background:var(--panel);color:var(--ink);cursor:pointer;font:inherit;font-weight:600;text-decoration:none;font-size:12px}
.btnrow .on{background:var(--accent);color:var(--accent-ink);border-color:var(--accent)}
#legend{margin-top:9px;font-size:11px;color:var(--ink-2)}
#attrib{position:absolute;bottom:0;right:0;z-index:5;background:rgba(255,255,255,.75);color:#333;font-size:10.5px;padding:2px 8px}
#pop{position:absolute;z-index:6;display:none;background:#fff;color:#22262B;border:1px solid #D4D8DC;box-shadow:0 4px 16px rgba(0,0,0,.35);padding:11px 13px;max-width:310px;font-size:12.5px;line-height:1.45}
#pop b.co{font-size:13.5px}
#pop .chip{background:#F0B400;color:#1A1400;font-weight:700;padding:0 6px;font-size:10.5px;letter-spacing:.03em}
#pop .chip.b{background:#E4E7EA;color:#22262B;font-weight:600}
#pop a{color:#0B62C4}
#pop .row{margin-top:5px}
#pop .x{position:absolute;top:4px;right:8px;cursor:pointer;font-weight:700;color:#5A626C}
</style>
</head>
<body>
<div id="deck"></div>
<div id="hud">
  <h1><span>Verladeregister</span> 3D-Karte</h1>
  <div class="sub" id="count">Lade Datensatz …</div>
  <div class="btnrow">
    <button id="m3d" class="on">3D-Dichte</button>
    <button id="mpt">Punkte</button>
    <button id="mver">Nur verifiziert</button>
    <a href="index.html">Register</a>
  </div>
  <div id="legend">Säulenhöhe = Anzahl Betriebe im Raster. Reinzoomen zeigt Einzelstandorte, Klick öffnet Details mit Satellit-Link. Rechte Maustaste/Strg: Ansicht drehen.</div>
</div>
<div id="pop"><span class="x" onclick="pop.style.display='none'">×</span><div id="popc"></div></div>
<div id="attrib">Bilder © Esri, Maxar, Earthstar Geographics · Daten © OpenStreetMap-Mitwirkende (ODbL)</div>
<script src="https://unpkg.com/deck.gl@9.0.36/dist.min.js"></script>
<script>
let DATA=[], mode='3d', onlyVer=false, deckgl=null;
const YELLOW=[240,180,0], DARK=[34,38,43];
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function baseLayers(){
  return [
    new deck.TileLayer({
      id:'sat', data:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
      minZoom:0, maxZoom:19, tileSize:256,
      renderSubLayers: p => {
        const bb = p.tile.boundingBox ? {west:p.tile.boundingBox[0][0], south:p.tile.boundingBox[0][1], east:p.tile.boundingBox[1][0], north:p.tile.boundingBox[1][1]} : p.tile.bbox;
        return new deck.BitmapLayer(p, {data:null, image:p.data, bounds:[bb.west,bb.south,bb.east,bb.north]});
      }
    }),
    new deck.TileLayer({
      id:'lbl', data:'https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
      minZoom:0, maxZoom:19, tileSize:256, opacity:0.9,
      renderSubLayers: p => {
        const bb = p.tile.boundingBox ? {west:p.tile.boundingBox[0][0], south:p.tile.boundingBox[0][1], east:p.tile.boundingBox[1][0], north:p.tile.boundingBox[1][1]} : p.tile.bbox;
        return new deck.BitmapLayer(p, {data:null, image:p.data, bounds:[bb.west,bb.south,bb.east,bb.north]});
      }
    })
  ];
}
function popupHTML(o){
  const sat=`https://maps.google.com/?q=${o.lat.toFixed(6)},${o.lon.toFixed(6)}&t=k`;
  let h=`<b class="co">${esc(o.co)}</b> <span class="chip ${o.ver?'':'b'}">${o.ver?'VERIFIZIERT':'BASIS'}</span>`;
  h+=`<div class="row">${esc([o.plz,o.ci].filter(Boolean).join(' '))}${o.bl?' · '+esc(o.bl):''}</div>`;
  if(o.ad)h+=`<div class="row">${esc(o.ad)}</div>`;
  if(o.ind)h+=`<div class="row"><i>${esc(o.ind)}</i></div>`;
  if(o.br)h+=`<div class="row">Marke: <b>${esc(o.br)}</b>${o.yr?' ('+esc(o.yr)+')':''}</div>`;
  if(o.doors)h+=`<div class="row">${esc(o.doors)}</div>`;
  const L=[`<a href="${sat}" target="_blank" rel="noopener">Satellit</a>`];
  if(o.src)L.push(`<a href="${esc(o.src)}" target="_blank" rel="noopener">Quelle</a>`);
  if(o.foto)L.push(`<a href="${esc(o.foto)}" target="_blank" rel="noopener">Foto</a>`);
  if(o.web)L.push(`<a href="${esc(o.web)}" target="_blank" rel="noopener">Website</a>`);
  if(o.ph)L.push(`<a href="tel:${esc(o.ph).replace(/[^+\d]/g,'')}">${esc(o.ph)}</a>`);
  if(o.em)L.push(`<a href="mailto:${esc(o.em)}">Mail</a>`);
  h+=`<div class="row">${L.join(' · ')}</div>`;
  return h;
}
function dataLayers(){
  const src=onlyVer?DATA.filter(o=>o.ver):DATA;
  const L=[];
  if(mode==='3d'){
    L.push(new deck.HexagonLayer({
      id:'hex',data:src,getPosition:o=>o.p,
      radius:6000,coverage:0.82,extruded:true,
      elevationScale:1,elevationRange:[0,45000],
      colorRange:[[255,244,200],[250,220,110],[240,180,0],[214,140,0],[176,96,0],[130,60,10]],
      opacity:0.55,pickable:false
    }));
  }
  L.push(new deck.ScatterplotLayer({
    id:'pts',data:src,getPosition:o=>o.p,
    getFillColor:o=>o.ver?DARK:YELLOW,
    getLineColor:o=>o.ver?YELLOW:DARK,
    getRadius:o=>o.ver?160:90,
    radiusMinPixels:mode==='3d'?1.2:2.4,radiusMaxPixels:14,
    stroked:true,lineWidthMinPixels:1,
    opacity:mode==='3d'?0.6:0.95,
    pickable:true
  }));
  return L;
}
function update(){deckgl.setProps({layers:[...baseLayers(),...dataLayers()]});}
fetch('data/leads.min.json').then(r=>r.json()).then(d=>{
  const F={}; d.fields.forEach((f,i)=>F[f]=i);
  DATA=d.rows.filter(r=>r[F.lat]&&r[F.lon]).map(r=>({
    p:[r[F.lon],r[F.lat]],
    ver:r[F.tier]==='verifiziert',
    co:r[F.company],ad:r[F.address],plz:r[F.plz],ci:r[F.city],bl:r[F.bundesland],
    ind:r[F.industry],br:r[F.brand],doors:r[F.doors_in_use],yr:r[F.year],
    ph:r[F.phone],em:r[F.email],web:r[F.website],src:r[F.source_url],foto:r[F.photo_url],
    lat:r[F.lat],lon:r[F.lon]
  }));
  document.getElementById('count').textContent=DATA.length.toLocaleString('de-DE')+' Standorte in Deutschland · Stand 07/2026';
  deckgl=new deck.DeckGL({
    container:'deck',
    initialViewState:{longitude:10.35,latitude:51.15,zoom:5.7,pitch:52,bearing:-12,maxPitch:70},
    controller:{inertia:250},
    layers:[],
    onClick:info=>{
      if(info.layer&&info.layer.id==='pts'&&info.object){
        popc.innerHTML=popupHTML(info.object);
        pop.style.display='block';
        const px=Math.min(info.x,window.innerWidth-330), py=Math.min(info.y,window.innerHeight-260);
        pop.style.left=Math.max(8,px)+'px'; pop.style.top=Math.max(8,py)+'px';
      } else { pop.style.display='none'; }
    },
    getCursor:({isHovering})=>isHovering?'pointer':'grab'
  });
  update();
});
const b3=document.getElementById('m3d'),bp=document.getElementById('mpt'),bv=document.getElementById('mver');
b3.onclick=()=>{mode='3d';b3.classList.add('on');bp.classList.remove('on');update();};
bp.onclick=()=>{mode='pt';bp.classList.add('on');b3.classList.remove('on');update();};
bv.onclick=()=>{onlyVer=!onlyVer;bv.classList.toggle('on',onlyVer);update();};
</script>
</body>
</html>
